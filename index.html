<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; style-src 'self'; script-src 'self'; img-src 'self' data:; font-src 'self';">
    <title>Météo des Neiges – Stations de ski près de Genève</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <h1>&#9924; Météo des Neiges</h1>
            <p class="subtitle">Conditions météo des stations de ski de la région de Genève</p>
        </div>
    </header>

    <main>
        <section class="last-updated" aria-live="polite">
            <p>Dernière mise à jour : <time id="update-time"></time></p>
        </section>

        <section class="search-section">
            <label for="resort-search" class="sr-only">Rechercher une station</label>
            <input type="search" id="resort-search" class="search-input"
                   placeholder="Rechercher une station…" autocomplete="off">
        </section>

        <section class="map-section" id="map-section" aria-label="Carte des stations">
            <!-- Map is rendered by js/app.js -->
        </section>

        <section class="resort-grid" id="resort-grid" aria-label="Conditions météo des stations">
            <!-- Cards are rendered by js/app.js -->
        </section>
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 Météo des Neiges &ndash; Données indicatives uniquement</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
